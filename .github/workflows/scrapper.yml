name: Reddit Scraper Pipeline

on:
  schedule:
    - cron: "30 15 * * *"   # 21:00 IST
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: reddit_scrapper

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 📥 Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 📦 Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 🌐 Setup Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # 🔍 DEBUG STEP (SAFE VERSION)
      - name: Dump page source
        run: |
          echo "Creating debug script..."
          
          cat > debug.py << 'EOF'
from selenium import webdriver
from selenium.webdriver.chrome.options import Options

options = Options()
options.add_argument("--headless=new")
options.add_argument("--no-sandbox")
options.add_argument("--disable-dev-shm-usage")

driver = webdriver.Chrome(options=options)
driver.get("https://www.reddit.com/r/worldnews/")

print("TITLE:", driver.title)
print("PAGE SOURCE (first 1000 chars):")
print(driver.page_source[:1000])

driver.quit()
EOF

          echo "Running debug script..."
          python debug.py

      # ▶️ Run scraper
      - name: Run scraper
        run: python daily_scrapper1.py

      # 💾 Commit Excel output
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add reddit_scrapper/*.xlsx
          git commit -m "Scraper update - $(date)" || echo "No changes"

          git pull --rebase origin main
          git push

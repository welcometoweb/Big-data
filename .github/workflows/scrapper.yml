name: Reddit Scraper Pipeline

on:
  schedule:
    - cron: "30 15 * * *"   # 21:00 IST
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: daily or backfill"
        required: true
        default: "daily"

permissions:
  contents: write

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 🔥 important for backfill

    steps:
      # 📥 Checkout full repo
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 🐍 Python setup
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 🌐 Install Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # 🔍 Verify Chrome (debug safety)
      - name: Verify Chrome
        run: google-chrome --version

      # ▶️ Run scraper (dynamic mode)
      - name: Run scraper
        run: |
          echo "Running mode: ${{ github.event.inputs.mode }}"
          
          if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
            python backfill_scraper1.py
          else
            python daily_scrapper1.py
          fi

      # 💾 Commit Excel updates
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.xlsx

          git commit -m "Scraper update - $(date)" || echo "No changes"

          git pull --rebase origin main
          git push

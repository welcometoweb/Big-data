name: Reddit Scraper Pipeline

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: reddit_scrapper

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # 🔍 DEBUG STEP (SAFE & YAML-COMPATIBLE)
      - name: Dump page source
        run: |
          python -c "from selenium import webdriver; from selenium.webdriver.chrome.options import Options; o=Options(); o.add_argument('--headless=new'); o.add_argument('--no-sandbox'); o.add_argument('--disable-dev-shm-usage'); d=webdriver.Chrome(options=o); d.get('https://www.reddit.com/r/worldnews/'); print('TITLE:', d.title); print(d.page_source[:1000]); d.quit()"

      - name: Run scraper
        run: python daily_scrapper1.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add reddit_scrapper/*.xlsx
          git commit -m "Scraper update - $(date)" || echo "No changes"

          git pull --rebase origin main
          git push

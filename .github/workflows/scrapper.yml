name: Test Python Scheduler

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED for push

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # 🔥 avoids sync issues

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: ▶️ Run test script
        run: python test_script.py

      - name: 💾 Commit output
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add test_output.txt
          git commit -m "Test run at $(date)" || echo "No changes"

          git pull --rebase origin main
          git push

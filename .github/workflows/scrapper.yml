name: Reddit Scraper Pipeline

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: reddit_scrapper

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 📥 Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 📦 Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 🌐 Install Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # 🖥️ Install virtual display (REAL FIX)
      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # ▶️ Run scraper (non-headless Chrome via Xvfb)
      - name: Run scraper
        run: |
          xvfb-run --auto-servernum python daily_scrapper1.py

      - name: Debug
        run: xvfb-run python debug.py

      # 💾 Commit Excel output (FIXED)
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          echo "Files in directory:"
          ls -l

          git add *.xlsx || echo "No Excel file to add"
          git commit -m "Scraper update - $(date)" || echo "No changes"

          git pull --rebase origin main
          git push
